server {
    listen 80;
    server_name carinsight.nl www.carinsight.nl;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name carinsight.nl www.carinsight.nl;

    ssl_certificate /etc/letsencrypt/live/carinsight.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/carinsight.nl/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location ~ ^/(voorraad|marktdata|status|kenteken|login|dealers) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /dashboard {
        alias /opt/carinsight/static/dashboard.html;
    }

    location / {
        root /opt/carinsight/static;
        index index.html;
    }
}
